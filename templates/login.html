<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Lista de Supermercado</title>
    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/index.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

    <div class="login-card">

        <div class="logo">🛒</div>

        <h1>Bem-vindo</h1>

        <p class="subtitulo">
            Entre para acessar sua lista de supermercado
        </p>

        {% if erro %}
        <div class="erro">
            {{ erro }}
        </div>
        {% endif %}

        <form method="POST">

            <div class="campo">
                <label>Usuário</label>

                <input
                    type="text"
                    name="username"
                    placeholder="Digite seu usuário"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="campo">
                <label>Senha</label>

                <input
                    type="password"
                    name="senha"
                    placeholder="Digite sua senha"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button class="btn-login" type="submit">
                Entrar
            </button>

        </form>

    </div>

</body>
</html>
